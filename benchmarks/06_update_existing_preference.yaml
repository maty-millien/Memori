id: 06_update_existing_preference
type: memory_tool_call
initial_memories:
  - id: "1"
    content: User prefers very detailed technical reports with many explanations.
turns:
  - role: user
    content: Actually, for technical reports, I now want something short, clear, and results-oriented.
expected:
  tool_calls:
    - name: memory.upsert
      arguments:
        memory_id: "1"
        content_regex: (?i)(?=.*\breports?\b)(?=.*\b(short|concise|brief|clear|results?)\b)
  forbidden_tool_calls:
    - name: memory.upsert
      arguments:
        memory_id: null
        content_regex: (?i)\btechnical reports?\b
  final_memory_count:
    min: 1
    max: 1
