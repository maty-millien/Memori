id: 09_full_multi_session_loop
type: full_loop
sessions:
  - id: chat_1_seed
    initial_memories: []
    expected_injected_content:
      should_match: []
    turns:
      - role: user
        content: I am planning a trip to Tokyo in June. For accommodation, I prefer budget hostels over hotels.
    expected:
      tool_calls:
        - name: memory.write
          arguments:
            content_regex: (?i)(?=.*\bTokyo\b)(?=.*\bJune\b)
        - name: memory.write
          arguments:
            content_regex: (?i)(?=.*\b(hostel|budget)\b)
      final_memory_count:
        min: 2
        max: 2
  - id: chat_2_update
    expected_injected_content:
      should_match:
        - regex: (?i)(?=.*\bTokyo\b)(?=.*\bJune\b)
    turns:
      - role: user
        content: Actually, I had to push the Tokyo trip back to October.
    expected:
      tool_calls:
        - name: memory.update
          arguments:
            content_regex: (?i)(?=.*\bTokyo\b)(?=.*\bOctober\b)
      forbidden_tool_calls:
        - name: memory.write
          arguments:
            content_regex: (?i)\bTokyo\b
      final_memory_count:
        min: 2
        max: 2
  - id: chat_3_retrieve
    expected_injected_content:
      should_match:
        - regex: (?i)(?=.*\bTokyo\b)(?=.*\bOctober\b)
        - regex: (?i)\b(hostel|budget)\b
    turns:
      - role: user
        content: What should I think about preparing for my trip?
    expected:
      answer_traits:
        - The answer references the Tokyo trip in October.
        - The answer takes the budget hostel accommodation preference into account.
      forbidden_tool_calls:
        - name: memory.write
          arguments:
            content_regex: (?i)\bTokyo\b
final_state:
  expected:
    final_memory_count:
      min: 2
      max: 2
    final_memories:
      should_match:
        - regex: (?i)(?=.*\bTokyo\b)(?=.*\bOctober\b)
        - regex: (?i)\b(hostel|budget)\b
