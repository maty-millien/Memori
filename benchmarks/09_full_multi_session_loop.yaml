id: 09_full_multi_session_loop
type: full_loop
sessions:
  - id: chat_1_seed
    initial_memories: []
    expected_injected_content:
      should_match: []
    turns:
      - role: user
        content: For this project, answer in French. Also, Memori should be a CLI-first memory prototype.
    expected:
      tool_calls:
        - name: memory.write
          arguments:
            kind: preference
            content_regex: (?i)\bFrench\b
        - name: memory.write
          arguments:
            kind: project
            content_regex: (?i)(?=.*\bMemori\b)(?=.*\bCLI\b)(?=.*\bmemory\b)
      final_memory_count:
        min: 2
        max: 2
  - id: chat_2_update
    expected_injected_content:
      should_match:
        - regex: (?i)(?=.*\bMemori\b)(?=.*\bCLI\b)
    turns:
      - role: user
        content: Actually, Memori should still be CLI-first, but the key demo is comparing with-memory and without-memory answers.
    expected:
      tool_calls:
        - name: memory.update
          arguments:
            content_regex: (?i)(?=.*\bCLI-first\b)(?=.*\bdemo\b)(?=.*\bwith-memory\b)(?=.*\bwithout-memory\b)
      final_memory_count:
        min: 2
        max: 3
  - id: chat_3_retrieve
    expected_injected_content:
      should_match:
        - regex: (?i)\bFrench\b
        - regex: (?i)(?=.*\bCLI-first\b)(?=.*\bdemo\b)
    turns:
      - role: user
        content: What should I show in the demo?
    expected:
      answer_traits:
        - The answer is written in French.
        - The answer mentions comparing with-memory and without-memory behaviour.
      forbidden_tool_calls:
        - name: memory.write
          arguments:
            content_regex: (?i)\bdemo\b
final_state:
  expected:
    final_memory_count:
      min: 2
      max: 3
    final_memories:
      should_match:
        - regex: (?i)\bFrench\b
        - regex: (?i)(?=.*\bMemori\b)(?=.*\bCLI\b)(?=.*\bdemo\b)(?=.*\bwith-memory\b)(?=.*\bwithout-memory\b)
