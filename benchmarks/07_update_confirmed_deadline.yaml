id: 07_update_confirmed_deadline
type: memory_tool_call
initial_memories:
  - id: mem_deadline_uncertain
    kind: fact
    content: The final presentation might be on Friday, but the information is uncertain.
turns:
  - role: user
    content: It is confirmed now, the final presentation is on Wednesday.
expected:
  tool_calls:
    - name: memory.update
      arguments:
        memory_id: mem_deadline_uncertain
        content_regex: (?i)(?=.*\bpresentation\b)(?=.*\bWednesday\b)
  forbidden_tool_calls:
    - name: memory.write
      arguments:
        content_regex: (?i)\bpresentation\b
  final_memory_count:
    min: 1
    max: 1
