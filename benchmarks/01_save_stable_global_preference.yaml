id: 01_save_stable_global_preference
description: Saves a durable response-style preference with global scope.
type: memory_loop
sessions:
  - id: save_preference
    record_summary: false
    turns:
      - role: user
        content: For future replies, I prefer concise answers with concrete next steps.
    expected:
      tool_calls:
        - name: memory.upsert
          arguments:
            memory_id: null
            scope: global
            importance: global_preference
            content_regex: (?i)(?=.*\b(concise|short|brief)\b)(?=.*\b(concrete|next steps?|actionable)\b)
      forbidden_tool_calls:
        - name: memory.delete
      final_memory_count:
        min: 1
        max: 1
      final_memories:
        should_match:
          - regex: (?i)(?=.*\b(concise|short|brief)\b)(?=.*\b(concrete|next steps?|actionable)\b)
final_state:
  final_memory_count:
    min: 1
    max: 1
