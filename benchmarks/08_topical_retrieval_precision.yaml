id: 08_topical_retrieval_precision
description: Ranks project context before unrelated personal preferences.
type: memory_loop
sessions:
  - id: project_context
    record_summary: false
    initial_memories:
      - id: "1"
        content: User is building Memori, a long-term memory layer for LLM conversations.
      - id: "2"
        content: User prefers oat milk in coffee.
    turns:
      - role: user
        content: Help me think through the retrieval architecture for the memory layer.
    expected:
      retrieved:
        include_ids:
          - "1"
          - "2"
        rank_before:
          - before: "1"
            after: "2"
        max_count: 2
        content:
          should_match:
            - regex: (?i)\bMemori\b|\bmemory layer\b
      forbidden_tool_calls:
        - name: memory.upsert
          arguments:
            content_regex: (?i)\boat milk\b
      final_memory_count:
        min: 2
        max: 2
