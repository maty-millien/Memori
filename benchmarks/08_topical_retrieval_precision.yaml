id: 08_topical_retrieval_precision
description: Retrieves project context and avoids unrelated personal preferences.
type: memory_loop
sessions:
  - id: project_context
    record_summary: false
    initial_memories:
      - id: mem_project
        content: User is building Memori, a long-term memory layer for LLM conversations.
      - id: mem_coffee
        content: User prefers oat milk in coffee.
    turns:
      - role: user
        content: Help me think through the retrieval architecture for the memory layer.
    expected:
      retrieved:
        include_ids:
          - mem_project
        exclude_ids:
          - mem_coffee
        max_count: 2
        content:
          should_match:
            - regex: (?i)\bMemori\b|\bmemory layer\b
          should_not_match:
            - regex: (?i)\boat milk\b
      forbidden_tool_calls:
        - name: memory.upsert
          arguments:
            content_regex: (?i)\boat milk\b
      final_memory_count:
        min: 2
        max: 2
