id: 02_retrieve_topic_isolation
type: retrieval_injection
initial_memories:
  - id: mem_cli
    content: TaskFlow should provide a Python CLI with add, list, complete, and search commands.
  - id: mem_workout
    content: User prefers running workouts in the morning.
turns:
  - role: user
    content: Which commands should the CLI expose for the task management prototype?
expected:
  injected_memory_ids:
    include:
      - mem_cli
    max_count: 2
  injected_memory_content:
    should_match:
      - regex: (?i)\bCLI\b
