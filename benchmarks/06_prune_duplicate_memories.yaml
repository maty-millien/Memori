id: 06_prune_duplicate_memories
description: Removes a redundant duplicate from retrieved memories.
type: memory_loop
sessions:
  - id: duplicate_cleanup
    record_summary: false
    initial_memories:
      - id: "1"
        content: User prefers TypeScript examples for code answers.
      - id: "2"
        content: User wants coding examples to be written in TypeScript.
    turns:
      - role: user
        content: Can you show me a quick map example for an array?
    expected:
      retrieved:
        content:
          should_match:
            - regex: (?i)\bTypeScript\b
      tool_calls:
        - name: memory.delete
          arguments:
            memory_id_regex: ^[12]$
      final_memory_count:
        min: 1
        max: 1
      final_memories:
        should_match:
          - regex: (?i)\bTypeScript\b
