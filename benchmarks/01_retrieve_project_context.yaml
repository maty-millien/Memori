id: 01_retrieve_project_context
type: retrieval_injection
initial_memories:
  - id: mem_project
    kind: project
    content: User is building TaskFlow, a CLI-based task management tool.
  - id: mem_running
    kind: preference
    content: User prefers running in the morning rather than in the evening.
turns:
  - role: user
    content: Can you help me think through the architecture for the task management tool?
expected:
  injected_memory_ids:
    include:
      - mem_project
    exclude:
      - mem_running
    max_count: 3
  injected_memory_content:
    should_match:
      - regex: (?i)\bTaskFlow\b
