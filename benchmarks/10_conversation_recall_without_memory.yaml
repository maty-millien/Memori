id: 10_conversation_recall_without_memory
description: Recalls a prior conversation summary without creating durable memory.
type: memory_loop
sessions:
  - id: factual_chat
    record_summary: true
    turns:
      - role: user
        content: Tell me three practical facts about solar panels.
    expected:
      forbidden_tool_calls:
        - name: memory.upsert
      final_memory_count:
        min: 0
        max: 0
  - id: recall_prior_topic
    record_summary: false
    turns:
      - role: user
        content: What technology topic did we talk about earlier?
    expected:
      answer:
        should_match:
          - regex: (?i)\bsolar panels?\b
      forbidden_tool_calls:
        - name: memory.upsert
      final_memory_count:
        min: 0
        max: 0
final_state:
  final_memory_count:
    min: 0
    max: 0
