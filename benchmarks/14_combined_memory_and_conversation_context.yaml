id: 14_combined_memory_and_conversation_context
description: Combines durable memory with recent conversation recall without saving ephemeral facts.
type: memory_loop
sessions:
  - id: save_code_preference
    record_summary: false
    turns:
      - role: user
        content: For code examples, please use Python unless I say otherwise.
    expected:
      tool_calls:
        - name: memory.upsert
          arguments:
            memory_id: null
            content_regex: (?i)\bPython\b
      final_memory_count:
        min: 1
        max: 1
  - id: ephemeral_fact_chat
    record_summary: true
    turns:
      - role: user
        content: What is the tallest mountain on Earth?
    expected:
      forbidden_tool_calls:
        - name: memory.upsert
          arguments:
            content_regex: (?i)\b(mountain|Everest)\b
      final_memory_count:
        min: 1
        max: 1
  - id: combined_context
    record_summary: false
    turns:
      - role: user
        content: Show me a tiny sorting example. Also, what natural landmark did we just discuss?
    expected:
      retrieved:
        content:
          should_match:
            - regex: (?i)\bPython\b
          should_not_match:
            - regex: (?i)\bEverest\b
      answer:
        should_match:
          - regex: (?i)\bPython\b|def\b|sorted\(
          - regex: (?i)\b(Everest|mountain)\b
      forbidden_tool_calls:
        - name: memory.upsert
          arguments:
            content_regex: (?i)\b(Everest|mountain)\b
      final_memory_count:
        min: 1
        max: 1
final_state:
  final_memory_count:
    min: 1
    max: 1
  final_memories:
    should_match:
      - regex: (?i)\bPython\b
    should_not_match:
      - regex: (?i)\b(Everest|mountain)\b
