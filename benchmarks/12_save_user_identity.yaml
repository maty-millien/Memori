id: 12_save_user_identity
description: Saves the user's name as durable identity information.
type: memory_loop
sessions:
  - id: introduction
    record_summary: false
    turns:
      - role: user
        content: My name is Maty. Nice to meet you.
    expected:
      tool_calls:
        - name: memory.upsert
          arguments:
            memory_id: null
            importance: identity
            content_regex: (?i)\bMaty\b
      forbidden_tool_calls:
        - name: memory.delete
      final_memory_count:
        min: 1
        max: 1
      final_memories:
        should_match:
          - regex: (?i)\bMaty\b
